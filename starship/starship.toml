# =========================================================
# STARSHIP CONFIG — FINAL (TMUX OPTIMIZED)
# Author: optimized
#
# Goals:
# - Clean and minimal prompt
# - Works perfectly inside tmux (no right prompt)
# - Fast and lightweight
# - No redundant system info (delegated to tmux)
# =========================================================

"$schema" = "https://starship.rs/config-schema.json"

# ========================
# 1. PERFORMANCE
# ========================

scan_timeout = 100
command_timeout = 500

follow_symlinks = false
add_newline = false


# ========================
# 2. PROMPT LAYOUT
# ========================

# Layout:
# Line 1 → context (directory + git)
# Line 2 → command input + lightweight info

format = """
➜\
$directory\
$git_branch\
$git_status\
$line_break\
$character $cmd_duration $time
"""

palette = "catppuccin_mocha"


# ========================
# 3. DIRECTORY MODULE
# ========================

[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Developer" = "󰲋 "


# ========================
# 4. PROMPT CHARACTER
# ========================

[character]
success_symbol = "[❯ ](bold fg:green)"
error_symbol   = "[✘ ](bold fg:red)"
vimcmd_symbol  = "[: ](bold fg:yellow)"


# ========================
# 5. GIT MODULES
# ========================

# --- Git branch ---
[git_branch]
symbol = " "
style  = "fg:lavender"
format = "[$symbol$branch]($style) "

# --- Git status ---
[git_status]
style = "fg:text"
format = "[$all_status$ahead_behind]($style)"

staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[»${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
conflicted = "[✖${count} ](red bold)"

ahead      = "[⇡${count} ](teal)"
behind     = "[⇣${count} ](peach)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"


# ========================
# 6. SYSTEM INFO (MINIMAL)
# ========================

# Command duration (only when slow)
[cmd_duration]
min_time = 500
format = "[󱎫 $duration]($style) "
style = "fg:yellow"

# Time (always visible but lightweight)
[time]
disabled = false
format = "[󰃰 $time]($style)"
time_format = "%H:%M"
style = "fg:lavender"


# ========================
# 7. OPTIONAL MODULES
# ========================

# Uncomment if you want exit status
# [status]
# disabled = false

# Uncomment if you want background jobs indicator
# [jobs]
# symbol = "✦"


# ========================
# 8. PALETTE: CATPPUCCIN MOCHA
# ========================

[palettes.catppuccin_mocha]

# --- background ---
crust = "#11111b"
mantle = "#181825"
base = "#1e1e2e"

surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"

overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"

# --- text ---
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"

# --- accents ---
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
