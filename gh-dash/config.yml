# =========================
# Pull Request Sections
# Priority-based workflow
# =========================
prSections:
  - title: Needs My Review
    filters: is:open review-requested:@me draft:false

  - title: My Active PRs
    filters: is:open author:@me draft:false

  - title: Ready to Merge
    filters: is:open review:approved status:success draft:false

  - title: Following
    filters: is:open involves:@me -author:@me -review-requested:@me

# =========================
# Issue Sections
# Actionable grouping
# =========================
issuesSections:
  - title: Assigned to Me
    filters: is:open assignee:@me

  - title: High Priority
    filters: is:open label:priority-high

  - title: Watching
    filters: is:open involves:@me -assignee:@me

# =========================
# Notifications
# Reduced noise
# =========================
notificationsSections:
  - title: Important
    filters: reason:review-requested,mention,assign

  - title: Other
    filters: reason:participating

# =========================
# Repo refresh settings
# Faster PR updates
# =========================
repo:
  branchesRefetchIntervalSeconds: 60
  prsRefetchIntervalSeconds: 60
  issuesRefetchIntervalSeconds: 120

# =========================
# Defaults
# =========================
defaults:
  preview:
    open: true
    width: 0.5

  prsLimit: 20
  issuesLimit: 20
  notificationsLimit: 20

  prApproveComment: LGTM

  view: prs

  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 16
      author:
        width: 10
      authorIcon:
        hidden: false
      assignees:
        hidden: true
      base:
        hidden: true
      lines:
        width: 8

    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 16
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        hidden: true

  refetchIntervalMinutes: 30

# =========================
# Keybindings
# Workflow optimized
# =========================
keybindings:
  universal:
    - key: g
      name: open lazygit
      command: >
        cd {{.RepoPath}} && lazygit

    - key: o
      name: open in browser
      command: >
        gh pr view {{.PrNumber}} --web || gh issue view {{.IssueNumber}} --web

    - key: y
      name: copy PR url
      command: >
        gh pr view {{.PrNumber}} --json url -q .url | pbcopy

  prs:
    - key: c
      name: checkout PR
      command: >
        gh pr checkout {{.PrNumber}}

    - key: C
      name: review in tmux
      command: >
        tmux new-window -n "PR-{{.PrNumber}}" "gh pr checkout {{.PrNumber}} && nvim"

    - key: v
      name: view diff
      command: >
        gh pr diff {{.PrNumber}} | ${PAGER:-less}

    - key: d
      name: diff in nvim
      command: >
        gh pr diff {{.PrNumber}} | nvim -R -

    - key: a
      name: approve PR
      command: >
        gh pr review {{.PrNumber}} --approve -b "LGTM"

    - key: r
      name: request changes
      command: >
        gh pr review {{.PrNumber}} --request-changes -b "Please address feedback"

    - key: R
      name: rebase PR
      command: >
        gh pr checkout {{.PrNumber}} && git pull --rebase origin main

  issues:
    - key: c
      name: view issue
      command: >
        gh issue view {{.IssueNumber}}

# =========================
# UI / Theme
# =========================
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: true

# =========================
# Pager
# =========================
pager:
  diff: "delta"

# =========================
# General behavior
# =========================
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: false

