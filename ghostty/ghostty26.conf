# =============================================================================
# Ghostty Terminal Configuration — Green Dark Forest Theme
# Optimized for: Neovim + Tmux + Backend / Cloud DevOps
# Author: anvndev
# =============================================================================

# -----------------------------------------------------------------------------
# Font Settings
# -----------------------------------------------------------------------------
font-family            = JetBrainsMono Nerd Font Mono
font-size              = 16
# 12% required so Nerd Font / powerline icons don't clip in tmux
adjust-cell-height     = 2%
# Disable ligatures — keeps powerline symbols predictable
font-feature           = -liga
# Thicken font for better visibility on dark backgrounds
font-thicken           = false

# -----------------------------------------------------------------------------
# Color Scheme — Green Dark Forest
# -----------------------------------------------------------------------------
background             = #010D00
foreground             = #B2D98B
cursor-style           = bar
cursor-opacity         = 0.8
cursor-color           = #80FF80
bold-is-bright         = false
# 1.1 is a light safety floor — higher values wash out the tuned palette
minimum-contrast       = 1.1

# Terminal ANSI Palette (One Dark inspired)
palette = 0=#010D00
palette = 1=#e06c75
palette = 2=#98c379
palette = 3=#e5c07b
palette = 4=#61afef
palette = 5=#c678dd
palette = 6=#56b6c2
palette = 7=#abb2bf
palette = 8=#5c6370
palette = 9=#e06c75
palette = 10=#98c379
palette = 11=#e5c07b
palette = 12=#61afef
palette = 13=#c678dd
palette = 14=#56b6c2
palette = 15=#ffffff

# -----------------------------------------------------------------------------
# Window & Visuals
# -----------------------------------------------------------------------------
background-opacity     = 0.92
background-blur-radius = 12
window-colorspace      = srgb
macos-titlebar-style   = hidden
window-padding-x       = 6
window-padding-y       = 4
window-padding-balance = true
window-save-state      = always
resize-overlay         = always
confirm-close-surface  = true

# -----------------------------------------------------------------------------
# Tmux & System Integration
# -----------------------------------------------------------------------------
# Critical: allows Alt/Option keys to work as Meta for tmux/Neovim navigation
macos-option-as-alt            = true
# title: reflects current process (nvim, kubectl, docker) in tmux window title
shell-integration-features     = no-cursor,sudo,title
mouse-scroll-multiplier        = 2
mouse-hide-while-typing        = true
copy-on-select                 = clipboard
# allow: required for Neovim "+ register (paste from system clipboard)
clipboard-read                 = allow
clipboard-trim-trailing-spaces = true
quit-after-last-window-closed  = true
# 50k lines — needed for long log tails, terraform plan, kubectl logs -f
scrollback-limit               = 50000

# Optional: auto-attach or create tmux session on launch
# command = tmux attach || tmux

# -----------------------------------------------------------------------------
# Keybindings
# Native Ghostty splits disabled — all pane management handled by tmux.
# Focus is on tab/window management at the terminal level.
# -----------------------------------------------------------------------------

# Tab management
keybind = cmd+t=new_tab
keybind = cmd+w=close_surface
keybind = cmd+]=next_tab
keybind = cmd+[=previous_tab
keybind = cmd+shift+right=next_tab
keybind = cmd+shift+left=previous_tab
keybind = cmd+1=goto_tab:1
keybind = cmd+2=goto_tab:2
keybind = cmd+3=goto_tab:3
keybind = cmd+4=goto_tab:4
keybind = cmd+5=goto_tab:5

# Window management
keybind = cmd+n=new_window
keybind = cmd+shift+d=new_window
keybind = cmd+shift+f=toggle_fullscreen

# Font scaling
keybind = cmd+equal=increase_font_size:1
keybind = cmd+minus=decrease_font_size:1
keybind = cmd+0=reset_font_size

# Clipboard & utilities
keybind = cmd+c=copy_to_clipboard
keybind = cmd+v=paste_from_clipboard
keybind = cmd+shift+c=clear_screen
keybind = cmd+r=reload_config

