# ==============================================================
# TMUX CONFIG — FINAL (CLEAN + PERFORMANCE + SCRIPTED GIT)
# Author: andev0x
# ==============================================================


# ========================
# 1. GENERAL SETTINGS
# ========================

set -g mouse on
set -s escape-time 0
set -g history-limit 50000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g focus-events on
set -g display-time 1500
set -g set-clipboard on

# Enable true color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Use vi-style keys in copy mode
setw -g mode-keys vi

# Smart window naming:
# - Show folder when using shell
# - Show process name otherwise
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'


# ========================
# 2. KEYBINDINGS
# ========================

# Prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3

# Toggle zoom
bind z resize-pane -Z

# Split panes (preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "✔ Config reloaded"

# Safe kill commands with confirmation
bind x confirm-before -p " Kill pane? (y/n)" kill-pane
bind X confirm-before -p " Kill window? (y/n)" kill-window
bind Q confirm-before -p " Kill session? (y/n)" kill-session

# ========================
# 3. POPUPS
# ========================

# Floating shell
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"

# Persistent scratch session
bind P display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  "tmux new-session -A -s scratch"

# Lazygit popup
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "command -v lazygit >/dev/null && lazygit || (echo 'lazygit not installed'; read)"

# File manager popup (yazi)
bind y display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "command -v yazi >/dev/null && yazi || (echo 'yazi not installed'; read)"


# ========================
# 4. SESSION MANAGEMENT
# ========================

# Smart session switcher
bind K run-shell "\
  if command -v sesh >/dev/null 2>&1 && command -v fzf-tmux >/dev/null 2>&1; then \
    sesh connect \"$(sesh list --icons | fzf-tmux -p 90%,80%)\"; \
  else \
    tmux choose-tree -Zs; \
  fi"

# Create new session
bind n command-prompt "new-session -s '%%'"


# ========================
# 5. STATUS BAR (NESTED PILL STYLE)
# ========================

set -g status-position bottom
set -g status-interval 2
set -g status-justify centre
set -g status-style "bg=default,fg=#cdd6f4"

# ----- LEFT: SESSION -----
set -g status-left-length 40
set -g status-left "#[fg=#a6e3a1,bg=default]#[fg=#1e1e2e,bg=#a6e3a1,bold]  #S #[fg=#a6e3a1,bg=default]"

# ----- CENTER: WINDOWS (Anti-Overflow Pro) -----

# Reduce separator to 1 space to reclaim horizontal real estate
setw -g window-status-separator " "

# Inactive windows:
# 1. Use #I:#{=5:window_name} -> Shows index and first 5 chars of the name
# 2. This ensures you always know what the tab is without it taking 20 characters
setw -g window-status-format "#[fg=#585b70,bg=default] #I#{=5:window_name} "

# Active window:
# 1. Unified Pill shape for balance
# 2. #{=15:window_name} -> Limits the active tab to 15 chars (prevents UI breaking)
# 3. Added a small dot (·) for a cleaner look between index and name
setw -g window-status-current-format "\
#[fg=#fab387,bg=default]#[fg=#1e1e2e,bg=#fab387,bold]#I \
#[fg=#cdd6f4,bg=#313244] #{=25:window_name} #[fg=#313244,bg=default]"

# ----- RIGHT: SYSTEM INFO -----
set -g status-right-length 120

# Included user@host back in the pink pill
set -g status-right "\
#[fg=#89b4fa,bg=default]#[fg=#1e1e2e,bg=#89b4fa] #[fg=#cdd6f4,bg=#313244] #(~/.config/tmux/scripts/git-read.sh \"#{pane_current_path}\") #[fg=#313244,bg=default] \
#[fg=#94e2d5,bg=default]#[fg=#1e1e2e,bg=#94e2d5] #[fg=#cdd6f4,bg=#313244] #(~/.config/tmux/scripts/cpu.sh) #[fg=#313244,bg=default] \
#[fg=#f5c2e7,bg=default]#[fg=#1e1e2e,bg=#f5c2e7] #[fg=#cdd6f4,bg=#313244] #{user}@#{host_short} #[fg=#313244,bg=default] \
#[fg=#a6e3a1,bg=default]#[fg=#1e1e2e,bg=#a6e3a1,bold]  %H:%M #[fg=#a6e3a1,bg=default]"

# ========================
# 6. PANE VISUALS
# ========================

set -g window-style 'fg=#6c7086,bg=default'
set -g window-active-style 'fg=#cdd6f4,bg=default'

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g message-style "fg=#fab387,bg=#313244,bold"


# ========================
# 7. COPY MODE
# ========================

bind-key -T copy-mode-vi v send-keys -X begin-selection

# Cross-platform clipboard support
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'if-shell "command -v wl-copy >/dev/null 2>&1" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"" \
    "if-shell \"command -v xclip >/dev/null 2>&1\" \
      \"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \\\"xclip -selection clipboard\\\"\" \
      \"bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel\""'


# ========================
# 8. PLUGINS
# ========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TPM (keep last)
run '~/.tmux/plugins/tpm/tpm'
