# ==============================================================
# TMUX CONFIG — FINAL REFINED MINIMAL
# Author: andev0x
# Philosophy:
# - Minimal but informative
# - Calm visual hierarchy
# - Focus-first workflow
# - Premium dark developer aesthetic
# ==============================================================


# ========================
# 1. GENERAL SETTINGS
# ========================

set -g mouse on
set -s escape-time 0
set -g history-limit 50000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g focus-events on
set -g display-time 1500
set -g set-clipboard on

# Enable true color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Use vim keys in copy mode
setw -g mode-keys vi

# Smart window naming:
# - Show folder when using shell
# - Show process name otherwise
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'


# ========================
# 2. COLOR PALETTE
# ========================

# Backgrounds
bg="#08110d"
surface="#111815"
surface_alt="#161f1b"

# Foregrounds
fg="#d7e3dc"
muted="#66706b"
subtle="#7d8b86"

# Accent colors
green="#8fbf87"
blue="#7a8fa3"
orange="#d8a46b"

# Borders
border="#1a2621"


# ========================
# 3. KEYBINDINGS
# ========================

# Prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3

# Toggle zoom
bind z resize-pane -Z

# Split panes while preserving cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "✔ Config reloaded"

# Safe kill actions
bind x confirm-before -p "Kill pane? (y/n)" kill-pane
bind X confirm-before -p "Kill window? (y/n)" kill-window
bind Q confirm-before -p "Kill session? (y/n)" kill-session


# ========================
# 4. POPUPS
# ========================

# Floating shell
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"

# Persistent scratch session
bind P display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  "tmux new-session -A -s scratch"

# Lazygit popup
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "command -v lazygit >/dev/null && lazygit || (echo 'lazygit not installed'; read)"

# Yazi popup
bind y display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "command -v yazi >/dev/null && yazi || (echo 'yazi not installed'; read)"


# ========================
# 5. STATUS BAR
# ========================

set -g status-position top
set -g status-interval 2
set -g status-justify centre
set -g status-style "bg=${bg},fg=${muted}"

# ---------------------------------------------------------
# LEFT: SESSION
# Dark pill with muted green text
# ---------------------------------------------------------

set -g status-left-length 40

set -g status-left "\
#[fg=${surface_alt},bg=${bg}]\
#[fg=${green},bg=${surface_alt},bold]  #S \
#[fg=${surface_alt},bg=${bg}]"


# ---------------------------------------------------------
# CENTER: WINDOWS
# Minimal active state
# ---------------------------------------------------------

setw -g window-status-separator "  "

# Inactive windows
setw -g window-status-format "\
#[fg=${muted},bg=${bg}]#I·#{=10:window_name}"

# Active window
setw -g window-status-current-format "\
#[fg=${surface_alt},bg=${bg}]\
#[fg=${orange},bg=${surface_alt},bold] #I \
#[fg=${fg},bg=${surface_alt}] #{=14:window_name} \
#[fg=${surface_alt},bg=${bg}]"


# ---------------------------------------------------------
# RIGHT: SYSTEM INFO
# Preserves custom scripts and metadata
# ---------------------------------------------------------

set -g status-right-length 120

set -g status-right "\
#[fg=${blue},bg=${bg}]#(~/.config/tmux/scripts/git-read.sh \"#{pane_current_path}\") \
#[fg=${bg},bg=${bg}]  \
#[fg=${surface},bg=${bg}]\
#[fg=${subtle},bg=${surface}]󰍛 #(~/.config/tmux/scripts/cpu.sh) \
#[fg=${surface},bg=${bg}] \
#[fg=${muted},bg=${bg}]#{user}@#{host_short} \
#[fg=${surface_alt},bg=${bg}]\
#[fg=${green},bg=${surface_alt},bold]  %H:%M \
#[fg=${surface_alt},bg=${bg}]"


# ========================
# 6. PANE VISUALS
# ========================

set -g window-style "fg=${muted},bg=default"
set -g window-active-style "fg=${fg},bg=default"

# Pane borders
set -g pane-border-style "fg=${border}"
set -g pane-active-border-style "fg=${green}"

# Message styling
set -g message-style "fg=${bg},bg=${green},bold"

# Copy/selection mode
set -g mode-style "fg=${bg},bg=${blue}"


# ========================
# 7. COPY MODE
# ========================

bind-key -T copy-mode-vi v send-keys -X begin-selection

# Cross-platform clipboard integration
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'if-shell "command -v wl-copy >/dev/null 2>&1" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"" \
    "if-shell \"command -v xclip >/dev/null 2>&1\" \
      \"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \\\"xclip -selection clipboard\\\"\" \
      \"bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel\""'


# ========================
# 8. PLUGINS
# ========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
