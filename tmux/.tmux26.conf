# ==============================================================
# TMUX CONFIG — FINAL HYBRID (CLEAN + POWER)
# Author: optimized
#
# Goals:
# - Clean and maintainable structure
# - Powerful workflow (sessions, popups, git)
# - Cross-platform compatibility
# - Neovim-friendly navigation
# - Minimal but essential plugins
# ==============================================================


# ========================
# 1. GENERAL SETTINGS
# ========================

set -g mouse on
set -s escape-time 0
set -g history-limit 50000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g focus-events on
set -g display-time 1500
set -g set-clipboard on

# Enable true color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Use vi-style keybindings in copy mode
setw -g mode-keys vi

# Smart window naming:
# - Show folder when using shell
# - Show process name otherwise
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'


# ========================
# 2. KEYBINDINGS
# ========================

# Prefix key (default for compatibility)
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Pane navigation (vim-style fallback)
# Note: vim-tmux-navigator provides seamless navigation without prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using arrow keys (conflict-free)
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3

# Toggle zoom
bind z resize-pane -Z

# Split panes (preserve current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "✔ Config reloaded"

# Safe kill bindings
bind x kill-pane
bind X kill-window
bind Q confirm-before -p "Kill session? (y/n)" kill-session


# ========================
# 3. POPUPS (FAST WORKFLOW)
# ========================

# Floating terminal
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"

# Persistent scratch session
bind P display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  "tmux new-session -A -s scratch"

# Lazygit popup (with fallback)
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "command -v lazygit >/dev/null && lazygit || (echo 'lazygit not installed'; read)"

# File manager popup (yazi fallback)
bind y display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "command -v yazi >/dev/null && yazi || (echo 'yazi not installed'; read)"


# ========================
# 4. SESSION MANAGEMENT
# ========================

# Smart session switcher:
# - Uses sesh + fzf if available
# - Falls back to built-in tmux tree
bind K run-shell "\
  if command -v sesh >/dev/null 2>&1 && command -v fzf-tmux >/dev/null 2>&1; then \
    sesh connect \"$(sesh list --icons | fzf-tmux -p 90%,80%)\"; \
  else \
    tmux choose-tree -Zs; \
  fi"

# Create new session
bind n command-prompt "new-session -s '%%'"


# ========================
# 5. STATUS BAR (CENTERED)
# ========================

set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-style "bg=default,fg=#cdd6f4"

# ----- LEFT: SESSION -----
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=#a6e3a1,bold] 󰊠 #[fg=#cdd6f4,bg=#313244,bold] #S #[default] "

# ----- CENTER: WINDOWS -----
setw -g window-status-separator ""

setw -g window-status-format " #[fg=#1e1e2e,bg=#89b4fa] #I #[fg=#cdd6f4,bg=#313244] #W "
setw -g window-status-current-format " #[fg=#1e1e2e,bg=#fab387,bold] #I #[fg=#cdd6f4,bg=#313244,bold] #W "

# Improve readability for inactive windows
setw -g window-status-style "fg=#9399b2,bg=default"

# ----- RIGHT: SYSTEM INFO -----
set -g status-right-length 100

set -g status-right "\
#[fg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa]  #[fg=#cdd6f4,bg=#313244] #(git -C '#{pane_current_path}' symbolic-ref --quiet --short HEAD 2>/dev/null || echo '-') #[default] \
#[fg=#94e2d5]#[fg=#1e1e2e,bg=#94e2d5]  #[bg=#313244]#{?#{>=:#{cpu_percentage},80},#[fg=#f38ba8],#{?#{>=:#{cpu_percentage},50},#[fg=#f9e2af],#[fg=#a6e3a1]}} #{cpu_percentage} #[default] \
#[fg=#f5c2e7]#[fg=#1e1e2e,bg=#f5c2e7]  #[fg=#cdd6f4,bg=#313244] #{user}@#{host_short} #[default] \
#[fg=#a6e3a1]#[fg=#1e1e2e,bg=#a6e3a1]  #[fg=#1e1e2e,bg=#a6e3a1,bold] %H:%M "


# ========================
# 6. PANE VISUALS
# ========================

# Dim inactive panes
set -g window-style 'fg=#6c7086,bg=default'
set -g window-active-style 'fg=#cdd6f4,bg=default'

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Messages
set -g message-style "fg=#fab387,bg=#313244,bold"


# ========================
# 7. COPY MODE (ROBUST)
# ========================

bind-key -T copy-mode-vi v send-keys -X begin-selection

# Cross-platform clipboard support

if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'if-shell "command -v wl-copy >/dev/null 2>&1" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"" \
    "if-shell \"command -v xclip >/dev/null 2>&1\" \
      \"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \\\"xclip -selection clipboard\\\"\" \
      \"bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel\""'


# ========================
# 8. PLUGINS (MINIMAL)
# ========================

set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# CPU usage in status bar
set -g @plugin 'tmux-plugins/tmux-cpu'

# Seamless navigation with Neovim
set -g @plugin 'christoomey/vim-tmux-navigator'

# Auto restore sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize plugin manager (KEEP LAST)
run '~/.tmux/plugins/tpm/tpm'

