# ==============================================================
# TMUX CONFIGURATION — PROFESSIONAL & USER-FRIENDLY EDITION
# Author: anvndev (optimized)
# Goal:
# - Clean UX
# - No keybinding conflicts (Ghostty-friendly)
# - Consistent with Neovim workflow
# - Lightweight + performant
# - Clear visual hierarchy + meaningful icons
# ==============================================================

# ========================
# 1. GENERAL SETTINGS
# ========================

set -g mouse on
set -s escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g display-time 1500
set -g set-clipboard on

# True color support (modern terminals like Ghostty)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Use vi-style keybindings in copy mode
setw -g mode-keys vi

# Smart window naming:
# - Shell → show folder
# - App   → show process name
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'


# ========================
# 2. KEYBINDINGS (NO CONFLICT DESIGN)
# ========================

# Prefix key (keep default for compatibility)
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# Window navigation (no conflict with Ghostty)
bind -r C-h previous-window
bind -r C-l next-window

# Pane navigation (prefix required → avoids clash with terminal)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (prefix + arrows for clarity)
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3

# Toggle zoom
bind z resize-pane -Z


# ========================
# 3. FLOATING TERMINAL (POPUP)
# ========================

# Quick popup terminal (non-intrusive)
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"

# Persistent scratch session
bind P display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  "tmux new-session -A -s scratch"


# ========================
# 4. STATUS BAR (CLEAN & PROFESSIONAL)
# ========================

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default,fg=#cdd6f4"

# ---------- LEFT: SESSION ----------
set -g status-left-length 40
set -g status-left "#[fg=#1e1e2e,bg=#a6e3a1,bold] 󰊠 #[fg=#cdd6f4,bg=#313244,bold] #S #[default] "

# ---------- WINDOW LIST ----------
setw -g window-status-separator ""

# Inactive window
setw -g window-status-format " #[fg=#1e1e2e,bg=#89b4fa] #I #[fg=#cdd6f4,bg=#313244] #W #[default]"

# Active window
setw -g window-status-current-format " #[fg=#1e1e2e,bg=#fab387,bold] #I #[fg=#cdd6f4,bg=#313244,bold] #W #[default]"

# ---------- RIGHT: INFO ----------
set -g status-right-length 120
set -g status-right "\
#[fg=#1e1e2e,bg=#cba6f7]  #[fg=#cdd6f4,bg=#313244] #(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null || echo '-') #[default] \
#[fg=#1e1e2e,bg=#94e2d5]  #[fg=#cdd6f4,bg=#313244] #{cpu_percentage} #[default] \
#[fg=#1e1e2e,bg=#f5c2e7]  #[fg=#cdd6f4,bg=#313244] #(whoami) #[default] \
#[fg=#1e1e2e,bg=#a6e3a1]  #[fg=#cdd6f4,bg=#313244,bold] %H:%M #[default]"

# ========================
# 5. PANE VISUALS
# ========================

# Dim inactive panes
set -g window-style 'fg=#6c7086,bg=default'
set -g window-active-style 'fg=#cdd6f4,bg=default'

# Borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Messages
set -g message-style "fg=#fab387,bg=#313244,bold"


# ========================
# 6. UTILITIES
# ========================

# Split panes (preserve working directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "✔ Config reloaded"

# Safe kill
bind x kill-pane
bind X kill-window
bind Q confirm-before -p "Kill session? (y/n)" kill-session

# Copy mode (macOS clipboard)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"


# ========================
# 7. PLUGINS (MINIMAL & STABLE)
# ========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Auto restore sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TPM (keep last)
run '~/.tmux/plugins/tpm/tpm'

